<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcelMedia</title>
    <meta name="description" content="ExcelMedia — Custom-coded websites built from scratch.">
    <meta name="theme-color" content="#2563eb">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="glow glow-4"></div>
    <div class="glow glow-5"></div>

    <div class="logo">EXCEL<span>MEDIA</span></div>

    <main>
        <p class="tagline">Websites we've built</p>
        <div class="cards">
            <a href="https://instincttweaks.com" target="_blank" rel="noopener" class="card">
                <div class="card-preview">
                    <iframe src="https://instincttweaks.com" loading="lazy" tabindex="-1"></iframe>
                    <div class="card-preview-fade"></div>
                </div>
                <div class="card-label">
                    <h2>Instinct Tweaks</h2>
                    <p class="card-type">PC Optimisation</p>
                    <p class="card-url">instincttweaks.com</p>
                </div>
            </a>
            <a href="https://vikagency.net" target="_blank" rel="noopener" class="card">
                <div class="card-preview">
                    <iframe src="https://vikagency.net" loading="lazy" tabindex="-1"></iframe>
                    <div class="card-preview-fade"></div>
                </div>
                <div class="card-label">
                    <h2>Vik Agency</h2>
                    <p class="card-type">Marketing Agency</p>
                    <p class="card-url">vikagency.net</p>
                </div>
            </a>
            <a href="https://nordichighlandestate.com/" target="_blank" rel="noopener" class="card">
                <div class="card-preview">
                    <iframe src="https://nordichighlandestate.com/" loading="lazy" tabindex="-1"></iframe>
                    <div class="card-preview-fade"></div>
                </div>
                <div class="card-label">
                    <h2>Nordic Highland Estate</h2>
                    <p class="card-type">Real Estate</p>
                    <p class="card-url">nordichighlandestate.com</p>
                </div>
            </a>
        </div>
    </main>

    <div class="email"><a href="mailto:contact@excelmedia.co.uk">contact@excelmedia.co.uk</a></div>

</body>
</html>
